<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>撮影用タイマー Ver2</title>
<style>
body{background:#111;color:#fff;font-family:sans-serif;margin:0;padding:15px}
.container{max-width:1000px;margin:auto}
h1{text-align:center}
input{background:#222;color:#fff;border:1px solid #555;padding:8px;font-size:18px;width:120px}
button{font-size:18px;padding:12px;margin:5px}
.mainTimer{text-align:center;font-size:90px;font-weight:bold;margin-top:20px;color:#fff}
.mainTimer.running{color:#ffd400}
.mainTimer.paused{color:orange}
.mainTimer.stopped{color:#fff}
.elapsed,.clock{text-align:center}
.elapsed{font-size:32px;color:#aaa}
.clock{font-size:28px;margin-bottom:20px}
.controls{text-align:center;margin:20px 0}
.notifyGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.notifyList{margin-top:20px;border-top:1px solid #444;padding-top:15px}
.done{color:#55ff55}.pending{color:#ccc}.nextNotify{color:#ffd400}
@media(max-width:700px){.mainTimer{font-size:60px}.elapsed{font-size:24px}.clock{font-size:22px}}
</style></head><body><div class="container">
<h1>撮影用タイマー Ver2</h1>
<div>総時間(HH:MM:SS) <input id="totalTime" value="00:50:00"></div>
<h3>通知時刻（経過時間）</h3>
<div class="notifyGrid" id="notifyGrid"></div>
<div class="controls">
<button onclick="startTimer()">スタート</button>
<button onclick="pauseTimer()">一時停止</button>
<button onclick="resumeTimer()">再開</button>
<button onclick="stopTimer()">停止</button>
<button onclick="resetTimer()">リセット</button>
<button onclick="resetNotifications()">通知リセット</button>
</div>
<div class="mainTimer stopped" id="remaining">00:50:00</div>
<div class="elapsed" id="elapsed">経過 00:00:00</div>
<div class="clock" id="clock"></div>
<div class="notifyList"><h3>通知予定</h3><div id="schedule"></div></div>
</div>
<script>
const notifyGrid=document.getElementById("notifyGrid");
for(let i=0;i<20;i++){let inp=document.createElement("input");inp.value="00:00:00";inp.id="notify"+i;inp.addEventListener("change",saveSettings);notifyGrid.appendChild(inp);}
let timer=null,endTime=null,totalSeconds=0,remainingWhenPaused=0;
let notified=new Set(),wakeLock=null,audioCtx=null;

function parseTime(str){let p=str.split(":").map(Number);if(p.length!==3)return 0;return p[0]*3600+p[1]*60+p[2];}
function formatTime(sec){sec=Math.max(0,Math.floor(sec));let h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60;return String(h).padStart(2,'0')+":"+String(m).padStart(2,'0')+":"+String(s).padStart(2,'0');}
function setTimerState(st){const el=document.getElementById("remaining");el.className="mainTimer "+st;}

function saveSettings(){
localStorage.setItem("totalTime",document.getElementById("totalTime").value);
let arr=[];for(let i=0;i<20;i++)arr.push(document.getElementById("notify"+i).value);
localStorage.setItem("notifyTimes",JSON.stringify(arr));updateSchedule();}
function loadSettings(){
let t=localStorage.getItem("totalTime"); if(t) document.getElementById("totalTime").value=t;
let arr=JSON.parse(localStorage.getItem("notifyTimes")||"[]");
arr.forEach((v,i)=>{if(document.getElementById("notify"+i))document.getElementById("notify"+i).value=v;});
updateDisplay(parseTime(document.getElementById("totalTime").value),0);updateSchedule();}
document.getElementById("totalTime").addEventListener("change",saveSettings);

async function requestWakeLock(){try{if('wakeLock' in navigator)wakeLock=await navigator.wakeLock.request('screen');}catch(e){}}
async function releaseWakeLock(){if(wakeLock){await wakeLock.release();wakeLock=null;}}

function startTimer(){
stopTimer();
if(!audioCtx){audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
audioCtx.resume();
totalSeconds=parseTime(document.getElementById("totalTime").value); if(totalSeconds<=0)return;
notified.clear(); endTime=Date.now()+totalSeconds*1000;
timer=setInterval(updateTimer,200); requestWakeLock(); setTimerState("running"); updateSchedule();
}
function updateTimer(){
let remain=(endTime-Date.now())/1000, elapsed=totalSeconds-remain;
updateDisplay(remain,elapsed); checkNotifications(elapsed);
if(remain<=0) finishTimer();
}
function updateDisplay(remain,elapsed=0){
document.getElementById("remaining").textContent=formatTime(remain);
document.getElementById("elapsed").textContent="経過 "+formatTime(elapsed);
}
function checkNotifications(elapsed){
for(let i=0;i<20;i++){let t=parseTime(document.getElementById("notify"+i).value);
if(t===0) continue;
if(!notified.has(i)&&elapsed>=t){beep();notified.add(i);updateSchedule();}}
}
function beep(){
if(!audioCtx)return;
for(let i=0;i<3;i++){let osc=audioCtx.createOscillator(),gain=audioCtx.createGain();
osc.frequency.value=1000;osc.connect(gain);gain.connect(audioCtx.destination);
let t=audioCtx.currentTime+i*0.25;gain.gain.setValueAtTime(0.3,t);
gain.gain.exponentialRampToValueAtTime(0.001,t+0.15);osc.start(t);osc.stop(t+0.15);}
}
function finishSound(){
if(!audioCtx)return;
for(let i=0;i<10;i++){let osc=audioCtx.createOscillator(),gain=audioCtx.createGain();
osc.frequency.value=(i%2===0)?1000:800;osc.connect(gain);gain.connect(audioCtx.destination);
let t=audioCtx.currentTime+i*0.2;gain.gain.setValueAtTime(0.3,t);
gain.gain.exponentialRampToValueAtTime(0.001,t+0.15);osc.start(t);osc.stop(t+0.15);}
}
function finishTimer(){clearInterval(timer);timer=null;updateDisplay(0,totalSeconds);finishSound();setTimerState("stopped");releaseWakeLock();}
function pauseTimer(){if(!timer)return;remainingWhenPaused=(endTime-Date.now())/1000;clearInterval(timer);timer=null;setTimerState("paused");}
function resumeTimer(){if(timer||remainingWhenPaused<=0)return;endTime=Date.now()+remainingWhenPaused*1000;timer=setInterval(updateTimer,200);setTimerState("running");}
function stopTimer(){clearInterval(timer);timer=null;setTimerState("stopped");releaseWakeLock();}
function resetTimer(){stopTimer();remainingWhenPaused=0;notified.clear();updateDisplay(parseTime(document.getElementById("totalTime").value),0);updateSchedule();}
function resetNotifications(){for(let i=0;i<20;i++)document.getElementById("notify"+i).value="00:00:00";saveSettings();}
function updateSchedule(){
let html="",nextFound=false;
for(let i=0;i<20;i++){let v=document.getElementById("notify"+i).value;if(v==="00:00:00")continue;
let cls="pending",mark="□";
if(notified.has(i)){cls="done";mark="✓";}
else if(!nextFound){cls="nextNotify";mark="▶";nextFound=true;}
html+=`<div class="${cls}">${mark} ${v}</div>`;}
document.getElementById("schedule").innerHTML=html;}
setInterval(()=>{document.getElementById("clock").textContent=new Date().toLocaleTimeString('ja-JP');},1000);
loadSettings();
</script></body></html>
