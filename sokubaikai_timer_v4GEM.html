<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>即売会タイマー Ver3</title>
    <style>
        body { margin: 0; background: #111; color: #fff; font-family: sans-serif; display: flex; justify-content: center; min-height: 100vh; }
        .c { width: 100%; max-width: 420px; padding: 20px; box-sizing: border-box; text-align: center; }
        .p { display: flex; justify-content: center; gap: 24px; margin: 8px 0 24px; }
        .w { width: 120px; }
        select { width: 100%; height: 180px; font-size: 32px; background: #222; color: #fff; border: 2px solid #555; border-radius: 12px; }
        #t { font-size: 84px; font-weight: bold; margin: 28px 0; color: #fff; }
        .run { color: #ffd400 !important; }
        .danger { color: #ff4444 !important; animation: b 1s infinite; }
        @keyframes b { 50% { opacity: .3; } }
        button { width: 100%; padding: 18px; margin: 8px 0; font-size: 28px; border: none; border-radius: 14px; color: #fff; cursor: pointer; }
        #start { background: #28a745; }
        #pause { background: #ff9800; }
        #reset { background: #666; }
        #s { margin-top: 12px; color: #ccc; font-size: 20px; }
    </style>
</head>
<body>
    <div class="c">
        <div class="p">
            <div class="w">
                <div>分</div>
                <select id="m" size="5"></select>
            </div>
            <div class="w">
                <div>秒</div>
                <select id="sec" size="5"></select>
            </div>
        </div>
        <div id="t">03:00</div>
        <button id="start">スタート</button>
        <button id="pause">一時停止</button>
        <button id="reset">リセット</button>
        <div id="s">状態：停止中</div>
    </div>

<script>
// 要素の取得
const elM = document.getElementById('m');
const elSec = document.getElementById('sec');
const elT = document.getElementById('t');
const elStart = document.getElementById('start');
const elPause = document.getElementById('pause');
const elReset = document.getElementById('reset');
const elS = document.getElementById('s');

// プルダウンの初期化
for(let i=0; i<=99; i++) elM.add(new Option(String(i).padStart(2,'0'), i, i===3, i===3));
for(let i=0; i<=59; i++) elSec.add(new Option(String(i).padStart(2,'0'), i, i===0, i===0));

let timer = null, end = 0, remain = 180, paused = false, total = 180, wake = null;
let alarmAudio = null;
const lastVoiced = new Set();

function fmt(x) {
    x = Math.max(0, Math.ceil(x));
    return String(Math.floor(x / 60)).padStart(2, '0') + ':' + String(x % 60).padStart(2, '0');
}

function draw(x) {
    elT.textContent = fmt(x);
    elT.className = '';
    if (timer) {
        elT.classList.add('run');
        if (x <= 5) elT.classList.add('danger');
    }
}

async function initAudio() {
    try {
        speechSynthesis.getVoices();
        let u = new SpeechSynthesisUtterance(' ');
        u.volume = 0;
        speechSynthesis.speak(u);
    } catch(e) {}
}

function speak(txt) {
    let u = new SpeechSynthesisUtterance(txt);
    u.lang = 'ja-JP';
    u.pitch = 1.3;
    u.rate = 1.05;
    speechSynthesis.speak(u);
}

function stopSounds() {
    speechSynthesis.cancel();
    // alarmAudioがnullのときのエラーを回避
    if (alarmAudio) {
        alarmAudio.pause();
        alarmAudio.currentTime = 0;
    }
}

async function wlOn() {
    try { if ('wakeLock' in navigator) wake = await navigator.wakeLock.request('screen'); } catch(e) {}
}

async function wlOff() {
    try { if (wake) { await wake.release(); wake = null; } } catch(e) {}
}

function voiceCheck(x) {
    if (lastVoiced.has(x)) return;
    if (total >= 90 && x === 60) speak('1分前');
    else if (total > 35 && x === 30) speak('30秒前');
    else if (x === 10) speak('10秒前');
    else if (x === 5) speak('ごー');
    else if (x === 4) speak('よん');
    else if (x === 3) speak('さん');
    else if (x === 2) speak('にー');
    else if (x === 1) speak('いち');
    else return;
    lastVoiced.add(x);
}

function tick() {
    remain = (end - Date.now()) / 1000;
    let x = Math.ceil(remain);
    draw(x);
    voiceCheck(x);
    
    if (remain <= 0) {
        clearInterval(timer);
        timer = null;
        draw(0);
        elS.textContent = '状態：終了';
        if (alarmAudio) alarmAudio.play().catch(() => {});
        wlOff();
    }
}

elStart.onclick = async () => {
    stopSounds();
    await initAudio();
    
    if (!alarmAudio) {
        alarmAudio = new Audio('Kitchen_Timer.mp3');
        alarmAudio.preload = 'auto';
        try {
            alarmAudio.volume = 0;
            await alarmAudio.play();
            alarmAudio.pause();
            alarmAudio.currentTime = 0;
            alarmAudio.volume = 1;
        } catch(e) { console.log(e); }
    }
    
    if (timer) return;
    total = (+elM.value * 60) + (+elSec.value);
    if (total <= 0) return;
    
    remain = total;
    lastVoiced.clear();
    end = Date.now() + remain * 1000;
    timer = setInterval(tick, 250);
    paused = false;
    elPause.textContent = '一時停止';
    elS.textContent = '状態：動作中';
    draw(remain);
    wlOn();
};

elPause.onclick = () => {
    stopSounds();
    if (!timer && !paused) return;
    
    if (timer) {
        clearInterval(timer);
        timer = null;
        paused = true;
        // 残り時間を現在の正確な値で固定
        remain = Math.max(0, (end - Date.now()) / 1000);
        elPause.textContent = '再開';
        elS.textContent = '状態：一時停止中';
    } else {
        end = Date.now() + remain * 1000;
        timer = setInterval(tick, 250);
        paused = false;
        elPause.textContent = '一時停止';
        elS.textContent = '状態：動作中';
    }
    draw(remain);
};

elReset.onclick = () => {
    stopSounds();
    clearInterval(timer);
    timer = null;
    paused = false;
    elPause.textContent = '一時停止';
    remain = (+elM.value * 60) + (+elSec.value);
    elS.textContent = '状態：停止中';
    lastVoiced.clear();
    draw(remain);
    wlOff();
};

elM.onchange = elSec.onchange = () => {
    if (!timer && !paused) {
        remain = (+elM.value * 60) + (+elSec.value);
        draw(remain);
    }
};

// 初期描画
draw(180);
</script>
</body>
</html>
