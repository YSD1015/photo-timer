<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>即売会タイマー Ver4</title>
<style>
body{margin:0;background:#111;color:#fff;font-family:sans-serif;display:flex;justify-content:center;min-height:100vh}
.c{width:100%;max-width:420px;padding:20px;box-sizing:border-box;text-align:center}
.p{display:flex;justify-content:center;gap:24px;margin:8px 0 24px}.w{width:120px}
select{width:100%;height:180px;font-size:32px;background:#222;color:#fff;border:2px solid #555;border-radius:12px}
#t{font-size:84px;font-weight:bold;margin:28px 0;color:#fff}.run{color:#ffd400!important}.danger{color:#ff4444!important;animation:b 1s infinite}
@keyframes b{50%{opacity:.3}}
button{width:100%;padding:18px;margin:8px 0;font-size:28px;border:none;border-radius:14px;color:#fff}
#start{background:#28a745}#pause{background:#ff9800}#reset{background:#666}#s{margin-top:12px;color:#ccc;font-size:20px}
</style></head><body><div class="c">
<div class="p"><div class="w"><div>分</div><select id="m" size="5"></select></div><div class="w"><div>秒</div><select id="sec" size="5"></select></div></div>
<div id="t">03:00</div><button id="start">スタート</button><button id="pause">一時停止</button><button id="reset">リセット</button><div id="s">状態：停止中</div></div>
<script>
for(let i=0;i<=99;i++)m.add(new Option(String(i).padStart(2,'0'),i,i===3,i===3));
for(let i=0;i<=59;i++)sec.add(new Option(String(i).padStart(2,'0'),i,i===0,i===0));
let timer=null,end=0,remain=180,total=180,paused=false,last=new Set(),wake=null;
let startAudio=null,endAudio=null;
function fmt(x){x=Math.max(0,Math.ceil(x));return String(Math.floor(x/60)).padStart(2,'0')+':'+String(x%60).padStart(2,'0')}
function draw(x){t.textContent=fmt(x);t.className='';if(timer){t.classList.add('run');if(x<=5)t.classList.add('danger');}}
async function initAudio(){try{speechSynthesis.getVoices();let u=new SpeechSynthesisUtterance(' ');u.volume=0;speechSynthesis.speak(u);
if(!startAudio){startAudio=new Audio('SE1_kit_timer_beep.mp3');startAudio.preload='auto';startAudio.volume=0;await startAudio.play().catch(()=>{});startAudio.pause();startAudio.currentTime=0;startAudio.volume=1;}
if(!endAudio){endAudio=new Audio('SE2_kitchen_timer.mp3');endAudio.preload='auto';endAudio.volume=0;await endAudio.play().catch(()=>{});endAudio.pause();endAudio.currentTime=0;endAudio.volume=1;}
}catch(e){console.log(e)}}
function stopSounds(){speechSynthesis.cancel();[startAudio,endAudio].forEach(a=>{if(a){a.pause();a.currentTime=0;}});}
function speak(txt){let u=new SpeechSynthesisUtterance(txt);u.lang='ja-JP';u.pitch=1.3;u.rate=1.05;speechSynthesis.speak(u);}
async function wlOn(){try{if('wakeLock' in navigator)wake=await navigator.wakeLock.request('screen')}catch(e){}}
async function wlOff(){try{if(wake){await wake.release();wake=null}}catch(e){}}
function voiceCheck(x){if(last.has(x))return;
if(total>=90&&x===60)speak('1分前');else if(total>35&&x===30)speak('30秒前');else if(x===10)speak('10秒前');
else if(x===5)speak('ごー');else if(x===4)speak('よん');else if(x===3)speak('さん');else if(x===2)speak('にー');else if(x===1)speak('いち');else return;last.add(x);}
function tick(){remain=(end-Date.now())/1000;let x=Math.ceil(remain);draw(x);voiceCheck(x);
if(remain<=0){clearInterval(timer);timer=null;draw(0);s.textContent='状態：終了';if(endAudio){endAudio.currentTime=0;endAudio.play().catch(()=>{});}wlOff();}}
start.onclick=async()=>{stopSounds();await initAudio();if(timer)return;total=(+m.value*60)+(+sec.value);if(total<=0)return;
if(startAudio){startAudio.currentTime=0;startAudio.play().catch(()=>{});}remain=total;last.clear();end=Date.now()+remain*1000;
timer=setInterval(tick,250);paused=false;pause.textContent='一時停止';s.textContent='状態：動作中';draw(remain);wlOn();};
pause.onclick=()=>{stopSounds();if(!timer&&!paused)return;if(timer){clearInterval(timer);timer=null;paused=true;pause.textContent='再開';s.textContent='状態：一時停止中';}
else{end=Date.now()+remain*1000;timer=setInterval(tick,250);paused=false;pause.textContent='一時停止';s.textContent='状態：動作中';}draw(remain);};
reset.onclick=()=>{stopSounds();clearInterval(timer);timer=null;paused=false;pause.textContent='一時停止';remain=(+m.value*60)+(+sec.value);s.textContent='状態：停止中';last.clear();draw(remain);wlOff();};
m.onchange=sec.onchange=()=>{if(!timer&&!paused){remain=(+m.value*60)+(+sec.value);draw(remain);}};
draw(180);
</script></body></html>
